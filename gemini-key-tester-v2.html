<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Key Tester</title>
<style>
  body{font-family:-apple-system,sans-serif;background:#f7f5f0;color:#1c2b2d;padding:20px;max-width:480px;margin:0 auto;}
  h1{font-size:18px;}
  input{width:100%;padding:10px;font-size:14px;border:1px solid #ccc;border-radius:7px;margin-bottom:10px;box-sizing:border-box;font-family:monospace;}
  button{width:100%;padding:12px;font-size:15px;font-weight:600;background:#233b3d;color:#fff;border:none;border-radius:7px;margin-bottom:10px;}
  #diagnostics{margin-top:6px;padding:12px;border-radius:8px;font-size:13px;background:#eee;line-height:1.6;}
  #result{margin-top:12px;padding:12px;border-radius:8px;font-size:14px;white-space:pre-wrap;word-break:break-word;}
  .ok{background:#e2ede7;color:#3c6e5a;}
  .fail{background:#f0e2da;color:#b5502f;}
  .warn{color:#a8781f;font-weight:700;}
  .good{color:#3c6e5a;font-weight:700;}
</style>
</head>
<body>
<h1>Gemini API Key Tester</h1>
<p>Paste your key below. It checks the shape of the key first (length, hidden characters) before contacting Google — none of this is saved or sent to me.</p>
<input type="text" id="key" placeholder="Paste your Gemini API key here" oninput="showDiagnostics()">
<div id="diagnostics"></div>
<button onclick="testKey()">Test key against Google</button>
<div id="result"></div>

<script>
function showDiagnostics(){
  const raw = document.getElementById('key').value;
  const trimmed = raw.trim();
  const hasLeadingTrailingSpace = raw !== trimmed;
  const hasQuotes = /^["']|["']$/.test(raw);
  const hasNewline = /[\r\n]/.test(raw);
  const isStandard = trimmed.startsWith('AIza');
  const isAuthKey = trimmed.startsWith('AQ.');
  const startsRight = isStandard || isAuthKey;
  const len = trimmed.length;

  let html = `Length: ${len} characters<br>`;
  if (isStandard){
    html += `Format: <span class="good">Standard key (AIza...) — looks right</span><br>`;
  } else if (isAuthKey){
    html += `Format: <span class="good">Auth key (AQ....) — Google's newer key format, looks right</span><br>`;
  } else {
    html += `Format: <span class="warn">Doesn't start with "AIza" or "AQ." — likely not a Gemini API key</span><br>`;
  }
  if (hasLeadingTrailingSpace) html += `<span class="warn">⚠ Has leading/trailing space or newline — will be auto-trimmed before testing</span><br>`;
  if (hasQuotes) html += `<span class="warn">⚠ Looks like quote marks got copied along with the key — remove them</span><br>`;
  if (hasNewline) html += `<span class="warn">⚠ Contains a line break</span><br>`;

  document.getElementById('diagnostics').innerHTML = html || 'Start typing/pasting to see diagnostics.';
}

async function testKey(){
  const raw = document.getElementById('key').value;
  // strip quotes and whitespace defensively
  const key = raw.trim().replace(/^["']|["']$/g, '');
  const el = document.getElementById('result');
  el.className = '';
  el.textContent = 'Testing...';
  if (!key){ el.textContent = 'Paste a key first.'; el.className='fail'; return; }
  try{
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`;
    const resp = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json', 'X-goog-api-key': key},
      body: JSON.stringify({ contents:[{ parts:[{ text:'Reply with just the word OK.' }] }] })
    });
    const data = await resp.json();
    if (!resp.ok){
      el.className = 'fail';
      el.textContent = 'FAILED — ' + (data.error?.message || JSON.stringify(data));
      return;
    }
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '(empty response)';
    el.className = 'ok';
    el.textContent = 'SUCCESS — key works.\nModel replied: ' + text;
  }catch(e){
    el.className = 'fail';
    el.textContent = 'FAILED — ' + e.message;
  }
}
</script>
</body>
</html>
