<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Key Tester</title>
<style>
  body{font-family:-apple-system,sans-serif;background:#f7f5f0;color:#1c2b2d;padding:20px;max-width:480px;margin:0 auto;}
  h1{font-size:18px;}
  input{width:100%;padding:10px;font-size:14px;border:1px solid #ccc;border-radius:7px;margin-bottom:10px;box-sizing:border-box;}
  button{width:100%;padding:12px;font-size:15px;font-weight:600;background:#233b3d;color:#fff;border:none;border-radius:7px;}
  #result{margin-top:16px;padding:12px;border-radius:8px;font-size:14px;white-space:pre-wrap;word-break:break-word;}
  .ok{background:#e2ede7;color:#3c6e5a;}
  .fail{background:#f0e2da;color:#b5502f;}
</style>
</head>
<body>
<h1>Gemini API Key Tester</h1>
<p>Paste your key below and tap Test. This makes one tiny request directly to Google — nothing is saved or sent anywhere else.</p>
<input type="text" id="key" placeholder="Paste your Gemini API key here">
<button onclick="testKey()">Test key</button>
<div id="result"></div>

<script>
async function testKey(){
  const key = document.getElementById('key').value.trim();
  const el = document.getElementById('result');
  el.className = '';
  el.textContent = 'Testing...';
  if (!key){ el.textContent = 'Paste a key first.'; el.className='fail'; return; }
  try{
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
    const resp = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ contents:[{ parts:[{ text:'Reply with just the word OK.' }] }] })
    });
    const data = await resp.json();
    if (!resp.ok){
      el.className = 'fail';
      el.textContent = 'FAILED — ' + (data.error?.message || JSON.stringify(data));
      return;
    }
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '(empty response)';
    el.className = 'ok';
    el.textContent = 'SUCCESS — key works.\nModel replied: ' + text;
  }catch(e){
    el.className = 'fail';
    el.textContent = 'FAILED — ' + e.message;
  }
}
</script>
</body>
</html>
