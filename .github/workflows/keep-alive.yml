name: Keep Supabase Active

on:
  schedule:
    # Runs every Monday at 09:00 UTC — well within Supabase's ~7 day pause window
    - cron: '0 9 * * 1'
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping claims table
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/claims?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
